# MSI MS-16V5 fan curve for msi-wmi-platform (hardware curve run by the EC).
# 6 points per fan: TEMP in degrees C, SPEED in percent. pwm1=CPU fan, pwm2=GPU fan.
#
# Ported from your msi-ec custom_curve (curve_apply):
#   raw: 0 50 41 55 55 60 65 65 85 68 100 80 120   (speed temp speed temp ... speed)
#   speeds 0,41,55,65,85,100,120 at temp breakpoints 50,55,60,65,68,80 (same for CPU & GPU).
# The driver's 6 points map to the EC's speed0..speed5 (speed6, the above-last-temp top, is not
# exposed). point1 holds speed0 = the speed below the first temperature: 0 => fans OFF at idle.
# Speeds are percent (0-100); your top speed6=120 has no point and is clamped by the EC anyway.
# Tune freely and `systemctl restart msi-fan-curve`.

# CPU (pwm1)
CPU_TEMP="50 55 60 65 68 80"
CPU_SPEED="0 41 55 65 85 100"

# GPU (pwm2)  -- your curve_apply used the same curve for both fans
GPU_TEMP="50 55 60 65 68 80"
GPU_SPEED="0 41 55 65 85 100"
